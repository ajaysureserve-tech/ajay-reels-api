<div class="quick-links" id="homeContent">
    <div class="icon-item" onclick="openAllApps()">
        <div class="icon-circle" style="background: #00bcd4;"><i class="fa fa-chevron-right"></i></div>
        <span>View all</span>
    </div>
</div>

<div id="appsModal" class="apps-overlay">
    <div class="modal-header">
        <h3>All Categories</h3>
        <span class="close-btn" onclick="closeAllApps()">&times;</span>
    </div>
    <div class="categories-container">
        <div class="app-category">
            <h4>Social Media</h4>
            <div class="app-grid">
                <div class="mini-app"><i class="fab fa-facebook" style="color:#1877f2"></i><span>Facebook</span></div>
                <div class="mini-app"><i class="fab fa-instagram" style="color:#e4405f"></i><span>Instagram</span></div>
            </div>
        </div>
        <div class="app-category">
            <h4>Business & Finance</h4>
            <div class="app-grid">
                <div class="mini-app"><i class="fa fa-briefcase"></i><span>LinkedIn</span></div>
                <div class="mini-app"><i class="fa fa-wallet"></i><span>Paytm</span></div>
            </div>
        </div>
        <div class="app-category">
            <h4>Dating & Lifestyle</h4>
            <div class="app-grid">
                <div class="mini-app"><i class="fa fa-heart" style="color:red"></i><span>Tinder</span></div>
                <div class="mini-app"><i class="fa fa-stethoscope"></i><span>Health</span></div>
            </div>
        </div>
        <div class="app-category">
            <h4>Shopping & Media</h4>
            <div class="app-grid">
                <div class="mini-app"><i class="fa fa-shopping-bag"></i><span>Myntra</span></div>
                <div class="mini-app"><i class="fa fa-music"></i><span>Spotify</span></div>
            </div>
        </div>
    </div>
</div>

<style>
/* 3. CSS for Categories Modal */
.apps-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: white; z-index: 1000; display: none; overflow-y: auto; color: #333;
}
.modal-header {
    padding: 20px; display: flex; justify-content: space-between;
    align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white;
}
.app-category { padding: 15px; border-bottom: 8px solid #f5f5f5; }
.app-category h4 { font-size: 14px; color: #888; margin-bottom: 15px; text-transform: uppercase; }
.app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
.mini-app { text-align: center; font-size: 12px; }
.mini-app i { font-size: 28px; display: block; margin-bottom: 5px; }
.close-btn { font-size: 30px; cursor: pointer; }
</style>

<script>
/* 4. JavaScript Functions */
function openAllApps() {
    document.getElementById('appsModal').style.display = 'block';
}
function closeAllApps() {
    document.getElementById('appsModal').style.display = 'none';
}
</script>
