<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajay Hub - Music & Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --yt-red: #ff0000; --bg-black: #0f0f0f; }
        body { background-color: var(--bg-black); color: white; margin: 0; font-family: sans-serif; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #0f0f0f; sticky: top; }
        .search-box { display: flex; width: 50%; }
        .search-box input { width: 100%; padding: 10px; border-radius: 20px 0 0 20px; border: 1px solid #333; background: #121212; color: white; outline: none; }
        .search-box button { padding: 0 20px; border-radius: 0 20px 20px 0; border: none; background: #333; color: white; cursor: pointer; }
        .downloader { padding: 30px; text-align: center; background: #1a1a1a; margin: 20px; border-radius: 15px; }
        .input-group { max-width: 500px; margin: 20px auto; display: flex; gap: 10px; }
        .input-group input { flex: 1; padding: 12px; border-radius: 5px; border: none; }
        .input-group button { padding: 12px; background: var(--yt-red); color: white; border: none; border-radius: 5px; cursor: pointer; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1e1e1e; border-radius: 10px; overflow: hidden; }
        .thumb { height: 150px; background: #333; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <nav>
        <div style="color:red; font-weight:bold; font-size:24px;">Ajay<span style="color:white;">Hub</span></div>
        <div class="search-box">
            <input type="text" id="ytQuery" placeholder="Search Music or Video...">
            <button onclick="searchYT()"><i class="fa fa-search"></i></button>
        </div>
        <div></div>
    </nav>

    <div class="downloader">
        <h2>Download Reels & YouTube Videos</h2>
        <div class="input-group">
            <input type="text" id="videoLink" placeholder="Paste link here...">
            <button onclick="startDownload()">Download</button>
        </div>
    </div>

    <div class="video-grid" id="grid">
        <div class="card"><div class="thumb"><i class="fa fa-play fa-2x"></i></div><div style="padding:10px;">Trending Song 1</div></div>
        <div class="card"><div class="thumb"><i class="fa fa-play fa-2x"></i></div><div style="padding:10px;">New Reel Video</div></div>
    </div>

    <script>
        function searchYT() {
            let q = document.getElementById('ytQuery').value;
            if(q) window.open("https://www.youtube.com/results?search_query=" + q, "_blank");
        }
        function startDownload() {
            let link = document.getElementById('videoLink').value;
            if(link) alert("Processing: " + link);
        }
    </script>
</body>
</html>
