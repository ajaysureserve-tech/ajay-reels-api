<script>
    // 1. Apni YouTube API Key yahan dalein (Google Cloud Console se milti hai)
    const API_KEY = 'YOUR_YOUTUBE_API_KEY_HERE'; 

    async function searchVideos() {
        let q = document.getElementById('ytQuery').value;
        if(!q) return alert("Bhai, kuch toh likho search karne ke liye!");

        // YouTube API se data fetch karna
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=12&q=${q}&type=video&key=${API_KEY}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            displayResults(data.items);
        } catch (error) {
            console.error("Error fetching data:", error);
            alert("Search limit khatam ho gayi ya API key galat hai!");
        }
    }

    function displayResults(videos) {
        let html = '';
        videos.forEach(v => {
            const videoId = v.id.videoId;
            const title = v.snippet.title;
            const thumb = v.snippet.thumbnails.medium.url;
            const channel = v.snippet.channelTitle;

            html += `
                <div class="video-card" onclick="playVideo('${videoId}')">
                    <div class="thumbnail">
                        <img src="${thumb}" style="width:100%; height:100%; object-fit:cover;">
                        <i class="fa fa-play-circle play-btn"></i>
                    </div>
                    <div class="v-info">
                        <strong style="display:block; height:40px; overflow:hidden;">${title}</strong>
                        <p style="font-size:12px; color:#aaa; margin-top:5px;">${channel}</p>
                    </div>
                </div>
            `;
        });
        document.getElementById('videoResults').innerHTML = html;
    }

    function playVideo(id) {
        const container = document.getElementById('player-container');
        const player = document.getElementById('mainPlayer');
        player.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
        container.style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
